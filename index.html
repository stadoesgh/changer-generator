<div id="app">
  <h1>image to changer</h1>
  <p>makes image become changer code to import an image to pictorbit. Yum!</p>

  <p>
    <input type="file" accept="image/*" id="fileInput">
  </p>

  <p>
    Source:<br>
    <canvas id="srcCanvas" width="90" height="90"></canvas>
  </p>

  <p>
    19x19 result:<br>
    <canvas id="pixelCanvas" style="image-rendering:pixelated;border:1px solid #000;"></canvas>
  </p>

  <p>
    Sprite size:<br>
    <label>
      <input type="radio" name="spriteSize" value="19" checked>
      19x19 (standard)
    </label><br>
    <label>
      <input type="radio" name="spriteSize" value="29">
      29x29 (bodys, dynamics etc)
    </label><br>
    <label>
      <input type="radio" name="spriteSize" value="38">
      38x38 (big things, wearables etc)
    </label><br>
    <label>
      <input type="radio" name="spriteSize" value="57">
      57x57 (very big things)
    </label>
  </p>

  <p>
    Resize method:<br>
    <label>
      <input type="radio" name="resizeMode" value="squash" checked>
      squash to fit (stretches the image to 19x19, ignores original shape)
    </label><br>
    <label>
      <input type="radio" name="resizeMode" value="crop">
      crop to fit (cuts off the edges so nothing gets squished)
    </label><br>
    <label>
      <input type="radio" name="resizeMode" value="fit">
      shrink to fit (keeps the full image, adds transparent padding so it's not squished)
    </label>
  </p>

  <p>
    <label for="colorLimitInput">Max colors:</label><br>
    <input type="number" id="colorLimitInput" value="55" min="1" max="55" style="width:60px;">
    (55 colors is the max)
  </p>

  <p>
    <label>
      <input type="checkbox" id="smoothToggle" checked>
      smooth resize
    </label>
  </p>

  <p>
    <label for="nameInput">creation name (optional)</label><br>
    <input type="text" id="nameInput" maxlength="37">
  </p>

  <p>
    <label>
      <input type="checkbox" id="alphaToggle" checked>
      use transparency
    </label>
  </p>

  <p id="status">no image loaded yet.</p>

  <p>
    <button id="copyBtn">copy code</button>
  </p>

  <pre id="output">// uplaod image.</pre>

  <p id="statLine"></p>
</div>

<script>
(function () {
  let SIZE = 19;
  let lastResult = null;
  let currentPixels = null;
  let lastImage = null;

  const fileInput = document.getElementById('fileInput');
  const srcCanvas = document.getElementById('srcCanvas');
  const pixelCanvas = document.getElementById('pixelCanvas');
  const nameInput = document.getElementById('nameInput');
  const alphaToggle = document.getElementById('alphaToggle');
  const smoothToggle = document.getElementById('smoothToggle');
  const colorLimitInput = document.getElementById('colorLimitInput');
  const resizeModeInputs = document.getElementsByName('resizeMode');
  const spriteSizeInputs = document.getElementsByName('spriteSize');

  function getSpriteSize() {
    for (const r of spriteSizeInputs) {
      if (r.checked) return parseInt(r.value, 10);
    }
    return 19;
  }
  const statusEl = document.getElementById('status');
  const outputEl = document.getElementById('output');
  const statLine = document.getElementById('statLine');
  const copyBtn = document.getElementById('copyBtn');

  function getMaxColors() {
    let v = parseInt(colorLimitInput.value, 10);
    if (isNaN(v) || v < 1) v = 1;
    if (v > 55) v = 55;
    return v;
  }

  function getResizeMode() {
    for (const r of resizeModeInputs) {
      if (r.checked) return r.value;
    }
    return 'squash';
  }

  // Draws img into destCtx at the given destination rect. When smooth=true,
  // downsamples in halving steps so large images are genuinely blended/averaged
  // rather than relying on a single low-quality browser resize pass (which barely
  // does anything visible when shrinking something huge down to ~19px).
  // When smooth=false, disables smoothing so the result is a hard, blocky resize.
  function drawResized(destCtx, img, sx, sy, sw, sh, dx, dy, dw, dh, smooth) {
    if (!smooth) {
      destCtx.imageSmoothingEnabled = false;
      destCtx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
      return;
    }

    // progressive halving downsample for real smoothing
    let curCanvas = document.createElement('canvas');
    curCanvas.width = sw;
    curCanvas.height = sh;
    let curCtx = curCanvas.getContext('2d');
    curCtx.imageSmoothingEnabled = true;
    curCtx.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);

    let curW = sw, curH = sh;
    while (curW > dw * 2 || curH > dh * 2) {
      const nextW = Math.max(dw, Math.round(curW / 2));
      const nextH = Math.max(dh, Math.round(curH / 2));
      const nextCanvas = document.createElement('canvas');
      nextCanvas.width = nextW;
      nextCanvas.height = nextH;
      const nextCtx = nextCanvas.getContext('2d');
      nextCtx.imageSmoothingEnabled = true;
      nextCtx.drawImage(curCanvas, 0, 0, curW, curH, 0, 0, nextW, nextH);
      curCanvas = nextCanvas;
      curCtx = nextCtx;
      curW = nextW;
      curH = nextH;
    }

    destCtx.imageSmoothingEnabled = true;
    destCtx.drawImage(curCanvas, 0, 0, curW, curH, dx, dy, dw, dh);
  }

  function quantizeColors(flatPixels, maxColors) {
    const colorMap = new Map();
    flatPixels.forEach(p => {
      const key = p.red + ',' + p.green + ',' + p.blue + ',' + p.alpha;
      if (!colorMap.has(key)) {
        colorMap.set(key, { red: p.red, green: p.green, blue: p.blue, alpha: p.alpha, count: 0 });
      }
      colorMap.get(key).count++;
    });
    let uniqueColors = Array.from(colorMap.values());

    if (uniqueColors.length <= maxColors) {
      return { palette: uniqueColors, lookup: buildLookup(uniqueColors) };
    }

    let buckets = [uniqueColors];

    function channelRange(bucket, channel) {
      let min = Infinity, max = -Infinity;
      bucket.forEach(c => {
        const v = c[channel];
        if (v < min) min = v;
        if (v > max) max = v;
      });
      return max - min;
    }

    function widestChannel(bucket) {
      const ranges = {
        red: channelRange(bucket, 'red'),
        green: channelRange(bucket, 'green'),
        blue: channelRange(bucket, 'blue')
      };
      return Object.keys(ranges).reduce((a, b) => ranges[a] >= ranges[b] ? a : b);
    }

    while (buckets.length < maxColors) {
      let splitIndex = -1, splitSize = 1;
      buckets.forEach((b, i) => {
        if (b.length > splitSize) { splitSize = b.length; splitIndex = i; }
      });
      if (splitIndex === -1) break;

      const bucket = buckets[splitIndex];
      const channel = widestChannel(bucket);
      bucket.sort((a, b) => a[channel] - b[channel]);
      const mid = Math.ceil(bucket.length / 2);
      const bucketA = bucket.slice(0, mid);
      const bucketB = bucket.slice(mid);
      buckets.splice(splitIndex, 1, bucketA, bucketB);
    }

    const palette = buckets.map(bucket => {
      let r = 0, g = 0, b = 0, a = 0, total = 0;
      bucket.forEach(c => {
        r += c.red * c.count;
        g += c.green * c.count;
        b += c.blue * c.count;
        a += c.alpha * c.count;
        total += c.count;
      });
      return {
        red: Math.round(r / total),
        green: Math.round(g / total),
        blue: Math.round(b / total),
        alpha: +(a / total).toFixed(3)
      };
    });

    return { palette, lookup: buildLookup(uniqueColors, palette) };

    function buildLookup(unique, paletteOverride) {
      const pal = paletteOverride || unique;
      const map = new Map();
      unique.forEach(c => {
        const key = c.red + ',' + c.green + ',' + c.blue + ',' + c.alpha;
        let best = pal[0], bestDist = Infinity;
        pal.forEach(p => {
          const dist = (c.red - p.red) ** 2 + (c.green - p.green) ** 2 +
                       (c.blue - p.blue) ** 2 + ((c.alpha - p.alpha) * 255) ** 2;
          if (dist < bestDist) { bestDist = dist; best = p; }
        });
        map.set(key, best);
      });
      return map;
    }
  }

  fileInput.addEventListener('change', e => {
    const f = e.target.files[0];
    if (f) handleFile(f);
  });

  function handleFile(file) {
    if (!file.type.startsWith('image/')) {
      setStatus('That file doesn\'t look like an image.');
      return;
    }
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      lastImage = img;
      drawSource(img);
      processImage(img);
      URL.revokeObjectURL(url);
    };
    img.onerror = () => setStatus('Could not load that image file.');
    img.src = url;
  }

  function drawSource(img) {
    const ctx = srcCanvas.getContext('2d');
    ctx.clearRect(0, 0, srcCanvas.width, srcCanvas.height);
    const s = Math.min(img.width, img.height);
    const sx = (img.width - s) / 2, sy = (img.height - s) / 2;
    ctx.drawImage(img, sx, sy, s, s, 0, 0, srcCanvas.width, srcCanvas.height);
  }

  function processImage(img) {
    SIZE = getSpriteSize();

    const off = document.createElement('canvas');
    off.width = SIZE;
    off.height = SIZE;
    const octx = off.getContext('2d');
    octx.clearRect(0, 0, SIZE, SIZE);

    const mode = getResizeMode();
    const smooth = smoothToggle.checked;

    if (mode === 'squash') {
      // stretch the whole image to fill the 19x19 square, ignoring aspect ratio
      drawResized(octx, img, 0, 0, img.width, img.height, 0, 0, SIZE, SIZE, smooth);

    } else if (mode === 'crop') {
      // crop the longer side so what's left is a square, then resize that
      // square (no distortion since it's already 1:1), filling the canvas
      const s = Math.min(img.width, img.height);
      const sx = (img.width - s) / 2;
      const sy = (img.height - s) / 2;
      drawResized(octx, img, sx, sy, s, s, 0, 0, SIZE, SIZE, smooth);

    } else { // 'fit' - shrink to fit inside 19x19, keep full image, pad the rest transparent
      const scale = Math.min(SIZE / img.width, SIZE / img.height);
      const drawW = Math.max(1, Math.round(img.width * scale));
      const drawH = Math.max(1, Math.round(img.height * scale));
      const dx = Math.floor((SIZE - drawW) / 2);
      const dy = Math.floor((SIZE - drawH) / 2);
      drawResized(octx, img, 0, 0, img.width, img.height, dx, dy, drawW, drawH, smooth);
    }

    const data = octx.getImageData(0, 0, SIZE, SIZE).data;

    const rawPixels = [];
    const flat = [];
    for (let x = 0; x < SIZE; x++) {
      rawPixels[x] = [];
      for (let y = 0; y < SIZE; y++) {
        const i = (y * SIZE + x) * 4;
        const p = {
          red: data[i],
          green: data[i + 1],
          blue: data[i + 2],
          alpha: +(data[i + 3] / 255).toFixed(3)
        };
        rawPixels[x][y] = p;
        flat.push(p);
      }
    }

    const maxColors = getMaxColors();
    const { palette, lookup } = quantizeColors(flat, maxColors);

    const pixels = [];
    for (let x = 0; x < SIZE; x++) {
      pixels[x] = [];
      for (let y = 0; y < SIZE; y++) {
        const p = rawPixels[x][y];
        const key = p.red + ',' + p.green + ',' + p.blue + ',' + p.alpha;
        pixels[x][y] = lookup.get(key);
      }
    }
    currentPixels = pixels;

    drawPixelPreview(pixels);
    generateCode();
    setStatus('Image processed - ' + SIZE + 'x' + SIZE + ', ' + (SIZE * SIZE) + ' pixels, ' + palette.length + ' colors (max ' + maxColors + ').');
  }

  function drawPixelPreview(pixels) {
    pixelCanvas.width = SIZE;
    pixelCanvas.height = SIZE;
    pixelCanvas.style.width = (SIZE * 10) + 'px';
    pixelCanvas.style.height = (SIZE * 10) + 'px';
    const ctx = pixelCanvas.getContext('2d');
    ctx.clearRect(0, 0, SIZE, SIZE);
    const imgData = ctx.createImageData(SIZE, SIZE);
    for (let x = 0; x < SIZE; x++) {
      for (let y = 0; y < SIZE; y++) {
        const p = pixels[x][y];
        const i = (y * SIZE + x) * 4;
        imgData.data[i] = p.red;
        imgData.data[i + 1] = p.green;
        imgData.data[i + 2] = p.blue;
        imgData.data[i + 3] = Math.round(p.alpha * 255);
      }
    }
    ctx.putImageData(imgData, 0, 0);
  }

  function rgbaLiteral(p, includeAlpha) {
    return includeAlpha
      ? `{red:${p.red},green:${p.green},blue:${p.blue},alpha:${p.alpha}}`
      : `{red:${p.red},green:${p.green},blue:${p.blue},alpha:1}`;
  }

  function generateCode() {
    if (!currentPixels) return;
    const includeAlpha = alphaToggle.checked;
    const name = (nameInput.value || '').trim().toLowerCase().slice(0, 37);

    const rows = [];
    for (let x = 0; x < SIZE; x++) {
      const rowVals = [];
      for (let y = 0; y < SIZE; y++) {
        rowVals.push(rgbaLiteral(currentPixels[x][y], includeAlpha));
      }
      rows.push('    [' + rowVals.join(',') + ']');
    }
    const pixelDataLiteral = '[\n' + rows.join(',\n') + '\n  ]';

    const nameAssign = name
      ? `    creation.name = ${JSON.stringify(name)}.slice(0, creation.info.nameMaxLength);\n`
      : '';

    const code = `function change(creation) {
    convertToFullColor(creation);

    var size = ${SIZE};
    var pixelData = ${pixelDataLiteral};

    for (var cell = 0; cell < creation.cells.length; cell++) {
        for (var x = 0; x < size; x++) {
            for (var y = 0; y < size; y++) {
                creation.cells[cell][x][y] = pixelData[x][y];
            }
        }
    }

${nameAssign}    return creation;
}`;

    lastResult = { code };
    outputEl.textContent = code;
    const kb = (new Blob([code]).size / 1024).toFixed(1);
    statLine.textContent = SIZE * SIZE + ' pixels baked in, code size approx ' + kb + ' KB' + (includeAlpha ? '' : ' (alpha forced to 1, opaque)');
  }

  function reprocessIfLoaded() {
    if (lastImage) processImage(lastImage);
  }

  nameInput.addEventListener('input', generateCode);
  alphaToggle.addEventListener('change', generateCode);
  smoothToggle.addEventListener('change', reprocessIfLoaded);
  colorLimitInput.addEventListener('input', reprocessIfLoaded);
  for (const r of resizeModeInputs) {
    r.addEventListener('change', reprocessIfLoaded);
  }
  for (const r of spriteSizeInputs) {
    r.addEventListener('change', reprocessIfLoaded);
  }
  colorLimitInput.addEventListener('change', () => {
    colorLimitInput.value = getMaxColors();
    reprocessIfLoaded();
  });

  copyBtn.addEventListener('click', () => {
    if (!lastResult) {
      setStatus('Nothing to copy yet - upload an image first.');
      return;
    }
    navigator.clipboard.writeText(lastResult.code).then(() => {
      copyBtn.textContent = 'Copied!';
      setTimeout(() => { copyBtn.textContent = 'Copy code'; }, 1400);
    }).catch(() => {
      setStatus('Copy failed - select the code manually.');
    });
  });

  function setStatus(msg) {
    statusEl.textContent = msg;
  }
})();
</script>
